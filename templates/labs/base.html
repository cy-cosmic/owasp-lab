{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description"
          content="Intentionally vulnerable OWASP-style web application demonstrating real-world security flaws including IDOR, XSS, CSRF, authentication bypass, and secure coding mitigations using Django."/>
    <meta name="author" content="Cyprian Munene"/>
    <title>cyprian.dev - OWASP Lab</title>
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %} ">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-16x16.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
          rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}"/>
    {% block head %}{% endblock %}
</head>
<body class="d-flex flex-column h-100 bg-dark">
<main class="flex-shrink-0">
    <!-- Navigation-->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top py-3 bg-dark "
         style="box-shadow: 0 0.5px 0 0 #343a40!important;">
        <div class="container px-5">
            <a class="navbar-brand" href="{% url 'mainindex' %}"><span class="fw-bold text-white"><i
                    class="bi bi-code-slash"
                    style="-webkit-text-stroke: 1px;text-stroke: 1px;padding-top: 2px"></i> OWASP Lab</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bold">
                    <li class="nav-item"><a class="nav-link {% if 'secure' in request.path %}text-white{% endif %}"
                                            href="{% url 'polls' %}">secure</a></li>
                    <li class="nav-item"><a class="nav-link {% if 'labs' in request.path %}text-white{% endif %}"
                                            href="{% url 'labs:index' %}">vulnerable</a></li>
                </ul>
            </div>
        </div>
    </nav>

    {% if 'labs' in request.path and request.user.is_authenticated %}
        <div class="container px-5 pt-3 pb-0 mb-0 ">
            <div class="d-flex justify-content-end">
                <small class="color-soft">
                    <i class="bi bi-person-check"></i> demo_user
                </small>
            </div>
        </div>
    {% endif %}
    {% block content %}
    {% endblock %}

</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js"
        integrity="sha512-HvOjJrdwNpDbkGJIG2ZNqDlVqMo77qbs4Me4cah0HoDrfhrbA+8SBlZn1KrvAQw7cILLPFJvdwIgphzQmMm+Pw=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
{% block scripts %}
{% endblock %}
</body>
</html>
