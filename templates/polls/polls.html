{% extends 'polls/base.html' %}
{% block content %}
    <div class="container px-5 mt-2 mb-5">
        <div class="row gx-5 justify-content-center">
            <div class="col-lg-11 col-xl-9 col-xxl-8">
                <section>
                    <h5 class="text-white mb-4">Polls - click to vote.</h5>
                    <div class="card border rounded-4 mb-5 bg-dark text-white ">
                        <div class="card-body p-5">
                            <ol class="color-soft">
                                {% for poll in polls %}
                                    <li>
                                        <p><a href="{% url 'detail' poll.id %}" onmouseover="this.style.color='#66bfff'"
                                              onmouseout="this.style.color='#d6d6d6'"
                                              style="text-decoration: none!important;color: #d6d6d6">{{ poll.question }}</a>
                                        </p>
                                    </li>
                                {% endfor %}
                            </ol>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
{% endblock %}
